<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rucking Progress Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0d1117;
            color: #e6edf3;
            font-family: 'JetBrains Mono', monospace;
            padding: 36px 28px;
            margin: 0;
        }
        .header { margin-bottom: 32px; }
        .sub-header { color: #8b949e; font-size: 10px; letter-spacing: 4px; text-transform: uppercase; }
        h1 {
            font-size: 28px; font-weight: 800; margin: 0;
            background: linear-gradient(90deg, #58a6ff 0%, #3fb950 50%, #f78166 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .stats-grid { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
        .stat-card {
            background: #161b22; border: 1px solid #21262d;
            border-radius: 8px; padding: 14px 20px; flex: 1 1 110px;
        }
        .stat-label { color: #8b949e; font-size: 9px; letter-spacing: 2px; margin-bottom: 4px; }
        .stat-value { font-size: 22px; font-weight: 700; }
        .chart-container {
            background: #161b22; border: 1px solid #21262d;
            border-radius: 12px; padding: 20px; margin-bottom: 20px;
        }
        canvas { max-height: 300px; width: 100% !important; }
    </style>
</head>
<body>

    <div class="header">
        <div class="sub-header">Training Analysis</div>
        <h1>負重進展總覽</h1>
        <div style="color: #8b949e; font-size: 11px; margin-top: 4px;">2025.02.16 — 2026.03.04</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">最高負重</div>
            <div class="stat-value" style="color: #ff7b72;">57 kg</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">平均負重</div>
            <div class="stat-value" style="color: #58a6ff;">18.5 kg</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">總距離</div>
            <div class="stat-value" style="color: #3fb950;">102.3 km</div>
        </div>
    </div>

    <div class="chart-container">
        <div class="stat-label" style="margin-bottom: 15px;">負重與距離趨勢 (KG / KM)</div>
        <canvas id="mainChart"></canvas>
    </div>

    <script>
        const rawData = [
            { date: "02/16", weight: 23, dist: 3.2 }, { date: "07/06", weight: 16, dist: 10.0 },
            { date: "07/09", weight: 4, dist: 6.25 }, { date: "07/13", weight: 6, dist: 13.15 },
            { date: "07/16", weight: 29, dist: 8.34 }, { date: "07/19", weight: 6, dist: 4.96 },
            { date: "07/21", weight: 2, dist: 4.07 }, { date: "07/22", weight: 16, dist: 1.6 },
            { date: "07/22", weight: 16, dist: 1.2 }, { date: "07/24", weight: 16, dist: 7.53 },
            { date: "07/25", weight: 2, dist: 3.62 }, { date: "07/27", weight: 2, dist: 4.32 },
            { date: "07/29", weight: 4, dist: 1.9 }, { date: "07/30", weight: 4, dist: 3.57 },
            { date: "07/31", weight: 21, dist: 8.65 }, { date: "12/28", weight: 57, dist: 3.14 },
            { date: "02/14", weight: 20, dist: 3.14 }, { date: "02/15", weight: 32, dist: 3.14 },
            { date: "02/16", weight: 22, dist: 3.03 }, { date: "02/17", weight: 38, dist: 3.0 },
            { date: "02/24", weight: 5, dist: 3.0 }, { date: "03/04", weight: 50, dist: 0.25 }
        ];

        new Chart(document.getElementById('mainChart'), {
            type: 'bar',
            data: {
                labels: rawData.map(d => d.date),
                datasets: [{
                    label: 'Weight (kg)',
                    data: rawData.map(d => d.weight),
                    backgroundColor: '#58a6ff',
                    borderRadius: 4,
                    yAxisID: 'y',
                }, {
                    label: 'Distance (km)',
                    data: rawData.map(d => d.dist),
                    type: 'line',
                    borderColor: '#3fb950',
                    borderWidth: 2,
                    pointRadius: 3,
                    yAxisID: 'y1',
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { type: 'linear', position: 'left', grid: { color: '#21262d' } },
                    y1: { type: 'linear', position: 'right', grid: { display: false } },
                    x: { grid: { display: false } }
                },
                plugins: { legend: { labels: { color: '#8b949e', font: { family: 'JetBrains Mono' } } } }
            }
        });
    </script>
</body>
</html>
