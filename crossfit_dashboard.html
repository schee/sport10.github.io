<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF6B35;
            --secondary: #004E89;
            --accent: #F7B801;
            --dark: #1A1A1D;
            --light: #F5F5F5;
            --success: #06D6A0;
            --korea: #E91E63;
            --japan: #3F51B5;
            --china: #F44336;
            --taiwan: #009688;
            --singapore: #FF5722;
            --hongkong: #9C27B0;
            --mongolia: #795548;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--dark);
            overflow-x: hidden;
        }

        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 2;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-family: 'Antonio', sans-serif;
            font-size: 4rem;
            color: white;
            text-shadow: 0 4px 30px rgba(0,0,0,0.3);
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.9);
            font-weight: 500;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease-out 0.2s backwards;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.2);
        }

        .stat-label {
            font-size: 0.85rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .stat-value {
            font-family: 'Antonio', sans-serif;
            font-size: 3rem;
            color: var(--dark);
            line-height: 1;
        }

        .section {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            animation: fadeInUp 0.8s ease-out backwards;
        }

        .section:nth-child(2) { animation-delay: 0.3s; }
        .section:nth-child(3) { animation-delay: 0.4s; }
        .section:nth-child(4) { animation-delay: 0.5s; }
        .section:nth-child(5) { animation-delay: 0.6s; }

        .section-title {
            font-family: 'Antonio', sans-serif;
            font-size: 2rem;
            color: var(--dark);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .section-title::before {
            content: '';
            width: 5px;
            height: 40px;
            background: linear-gradient(180deg, var(--primary), var(--accent));
            border-radius: 10px;
        }

        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .podium-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 30px 20px;
            text-align: center;
            min-width: 200px;
            position: relative;
            transition: transform 0.3s ease;
        }

        .podium-item:hover {
            transform: scale(1.05);
        }

        .podium-item.first {
            order: 2;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            transform: scale(1.1);
        }

        .podium-item.second {
            order: 1;
            background: linear-gradient(135deg, #C0C0C0 0%, #808080 100%);
        }

        .podium-item.third {
            order: 3;
            background: linear-gradient(135deg, #CD7F32 0%, #8B4513 100%);
        }

        .medal {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .athlete-name {
            font-weight: 700;
            font-size: 1.3rem;
            margin-bottom: 5px;
        }

        .athlete-country {
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .athlete-rank {
            font-family: 'Antonio', sans-serif;
            font-size: 2rem;
            color: var(--dark);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        thead {
            background: var(--dark);
            color: white;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        tbody tr {
            transition: background 0.2s ease;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        .rank-badge {
            display: inline-block;
            background: var(--secondary);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .rank-badge.top10 {
            background: var(--success);
        }

        .rank-badge.top5 {
            background: var(--primary);
        }

        .country-flag {
            font-size: 1.5rem;
            margin-right: 8px;
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin-top: 30px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 24px;
            background: #f0f0f0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .tab:hover {
            background: #e0e0e0;
        }

        .tab.active {
            background: var(--primary);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .country-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .country-card:hover {
            transform: translateX(10px);
        }

        .country-info h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .country-stats {
            display: flex;
            gap: 20px;
        }

        .country-stat {
            text-align: center;
        }

        .country-stat-value {
            font-family: 'Antonio', sans-serif;
            font-size: 2rem;
        }

        .country-stat-label {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .highlight {
            background: linear-gradient(120deg, var(--accent) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .podium {
                flex-direction: column;
                align-items: stretch;
            }
            
            .podium-item.first {
                order: 1;
            }
            
            .podium-item.second {
                order: 2;
            }
            
            .podium-item.third {
                order: 3;
            }
            
            .stat-value {
                font-size: 2.5rem;
            }
            
            table {
                font-size: 0.9rem;
            }
            
            th, td {
                padding: 10px 5px;
            }
        }
    </style>
</head>

        // 初始化
        function init() {

        // 國家分布圖表
        function renderCountryChart() {
            const ctx = document.getElementById('countryChart').getContext('2d');
            const countries = dashboardData.overview.countries;
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: countries.map(c => c.name),
                    datasets: [{
                        label: '選手數量',
                        data: countries.map(c => c.athletes),
                        backgroundColor: [
                            'rgba(233, 30, 99, 0.8)',
                            'rgba(63, 81, 181, 0.8)',
                            'rgba(244, 67, 54, 0.8)',
                            'rgba(0, 150, 136, 0.8)',
                            'rgba(255, 87, 34, 0.8)',
                            'rgba(156, 39, 176, 0.8)',
                            'rgba(121, 85, 72, 0.8)'
                        ],
                        borderRadius: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });
        }

                else if (athlete.rank <= 10) badgeClass += ' top10';
                
                row.innerHTML = `
                    <td><span class="${badgeClass}">#${athlete.rank}</span></td>
                    <td><strong>${athlete.name}</strong></td>
                    <td>${athlete.country}</td>
                    <td>${athlete.gender === 'Male' ? '男' : '女'}</td>
                    <td>${athlete.age}</td>
                    <td>${athlete.points.toLocaleString()}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // 各國卡片
        function renderCountryCards() {
            const container = document.getElementById('countryCards');
            dashboardData.countryComparison.forEach(country => {
                const card = document.createElement('div');
                card.className = 'country-card';
                card.innerHTML = `
                    <div class="country-info">
                        <h3>${country.country}</h3>
                        <div>最佳選手: <strong>${country.bestAthlete}</strong> (${country.gender === 'Male' ? '男' : '女'})</div>
                    </div>
                    <div class="country-stats">
                        <div class="country-stat">
                            <div class="country-stat-value">#${country.bestRank}</div>
                            <div class="country-stat-label">最佳排名</div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Workout 表格
        function renderWorkoutTables() {
            for (let i = 1; i <= 4; i++) {
                const container = document.getElementById(`workout${i}`);
                const data = dashboardData.workoutPerformance[`workout${i}`];
                
                let html = '<table><thead><tr><th>國家</th><th>選手</th><th>排名</th><th>成績</th></tr></thead><tbody>';
                data.forEach(item => {
                    let badgeClass = 'rank-badge';
                    if (item.rank <= 100) badgeClass += ' top10';
                    if (item.rank <= 50) badgeClass += ' top5';
                    
                    html += `
                        <tr>
                            <td>${item.country}</td>
                            <td><strong>${item.athlete}</strong></td>
                            <td><span class="${badgeClass}">#${item.rank}</span></td>
                            <td>${item.score}</td>
                        </tr>
                    `;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            }
        }

        // 切換 Workout
        function showWorkout(num) {
            // 隱藏所有內容
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // 顯示選中的內容
            document.getElementById(`workout${num}`).classList.add('active');
            event.target.classList.add('active');
        }

        // 頁面載入時初始化
        window.addEventListener('load', init);
    </script>
</body>
</html>
